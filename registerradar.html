<!DOCTYPE html>
<!-- // Объявляем HTML5 документ. -->

<html lang="he" dir="rtl">
<!-- // lang="he" = язык иврит, dir="rtl" = направление справа-налево (важно для текста и меню). -->

<head>
<!-- // “Голова” страницы: мета, стили, подключения. -->

  <meta charset="UTF-8" />
  <!-- // Кодировка UTF-8, чтобы иврит/русский отображались нормально. -->

  <title>Sentramind — הרשמה</title>
  <!-- // Заголовок вкладки в браузере (“регистрация”). -->

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- // Адаптивность для телефонов: ширина = экрану, масштаб 1. -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- // Подключение Bootstrap CSS: классы navbar, container, form-control, btn, etc. -->

  <style>
    /* // Встроенный CSS прямо в HTML (вместо отдельного register.css). */

    body {
      background: radial-gradient(circle at top, #141927, #05070c);
      /* // Тёмный радиальный фон страницы. */

      color: #fff;
      /* // Белый цвет текста по умолчанию. */

      font-family: system-ui;
      /* // Системный шрифт. */

      padding-top: 80px;
      /* // Отступ сверху, чтобы контент не залезал под fixed-top navbar. */
    }

    .auth-box {
      max-width: 420px;
      /* // Максимальная ширина формы регистрации. */

      margin: auto;
      /* // Центрируем блок по горизонтали. */

      background: rgba(0,0,0,0.55);
      /* // Полупрозрачный фон карточки. */

      padding: 25px;
      /* // Внутренние отступы. */

      border-radius: 18px;
      /* // Скругление углов карточки. */

      border: 1px solid rgba(255,255,255,0.2);
      /* // Светлая тонкая рамка. */

      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      /* // Тень вокруг карточки. */
    }

    .auth-title {
      text-align: center;
      /* // Центрируем заголовок. */

      font-size: 1.4rem;
      /* // Размер заголовка. */

      margin-bottom: 10px;
      /* // Отступ снизу. */

      font-weight: 700;
      /* // Жирный. */

      letter-spacing: 0.05em;
      /* // Небольшая разрядка букв. */
    }

    .sentra-logo {
      display: block;
      /* // Чтобы margin:auto сработал как у блочного элемента. */

      margin: auto;
      /* // Центрируем логотип. */

      height: 80px;
      /* // Высота логотипа. */

      filter: drop-shadow(0 0 12px rgba(255,111,159,0.6));
      /* // Розовое свечение вокруг лого (через CSS filter). */
    }

    .error-box {
      margin-top: 10px;
      /* // Отступ сверху. */

      color: #ff9d9d;
      /* // Цвет ошибки (светло-красный). */

      font-size: 0.9rem;
      /* // Размер текста ошибки. */

      display: none;
      /* // Скрыто по умолчанию, JS включает display:block при ошибке. */
    }

    .btn-main {
      background: linear-gradient(90deg, #ff6f9f, #ff8fb3);
      /* // Розовый градиент кнопки. */

      color: #020617;
      /* // Тёмный цвет текста на светлой кнопке. */

      font-weight: 600;
      /* // Полужирный. */

      border: none;
      /* // Без рамки. */
    }
  </style>
  <!-- // Конец встроенных стилей. -->
</head>

<body>
<!-- // Тело страницы (видимая часть). -->

<nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background:rgba(0,0,0,0.85)">
<!-- // Bootstrap navbar сверху.
     // fixed-top = фиксирован сверху.
     // navbar-expand-lg = на маленьком экране сворачивается в “бургер”.
     // style background ... = задаёшь фон прямо тут (перебивает Bootstrap). -->

  <div class="container">
  <!-- // Ограничение ширины + отступы Bootstrap. -->

    <a class="navbar-brand d-flex align-items-center" href="index.html">
    <!-- // Левый бренд/логотип.
         // d-flex align-items-center = выравнивание по центру по вертикали. -->

      <img src="orolmini.png" style="height:34px" class="me-2" />
      <!-- // Маленький логотип в navbar.
           // me-2 = отступ “margin-end” из Bootstrap. -->

      SENTRAMIND
      <!-- // Текст бренда рядом с логотипом. -->
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
    <!-- // Кнопка “бургер” (для телефона).
         // data-bs-target="#nav" привязано к <div id="nav"> ниже. -->

      <span class="navbar-toggler-icon"></span>
      <!-- // Иконка бургера (Bootstrap). -->
    </button>

    <div class="collapse navbar-collapse" id="nav">
    <!-- // Контейнер меню, который сворачивается/разворачивается. -->

      <ul class="navbar-nav ms-auto">
      <!-- // Список меню.
           // ms-auto = сдвинуть меню к “концу” (auto margin start). -->

        <li class="nav-item"><a class="nav-link" href="radar.html">התחברות</a></li>
        <!-- // Пункт меню “Вход” (ведёт на radar.html). -->

        <li class="nav-item"><a class="nav-link active" href="register.html">הרשמה</a></li>
        <!-- // Пункт меню “Регистрация” (текущая страница: active). -->
      </ul>
    </div>
  </div>
</nav>

<div class="auth-box">
<!-- // Карточка регистрации, стилизована классом .auth-box (см. CSS выше). -->

  <img src="orolbig.png" class="sentra-logo" />
  <!-- // Большой логотип в форме (класс .sentra-logo даёт размер+свечение). -->

  <h2 class="auth-title">יצירת משתמש חדש</h2>
  <!-- // Заголовок “создать нового пользователя”. -->

  <form id="registerForm">
  <!-- // Форма регистрации.
       // id="registerForm" привязан к JS: document.getElementById("registerForm"). -->

    <div class="mb-3">
    <!-- // Обёртка поля (Bootstrap), mb-3 = отступ снизу. -->

      <label class="form-label">אימייל</label>
      <!-- // Подпись поля email. -->

      <input type="email" class="form-control" id="regEmail" required />
      <!-- // Поле email.
           // id="regEmail" привязан к JS.
           // required = нельзя отправить пустым.
           // form-control = стиль Bootstrap. -->
    </div>

    <div class="mb-3">
    <!-- // Обёртка поля пароля. -->

      <label class="form-label">סיסמה</label>
      <!-- // Подпись “пароль”. -->

      <input type="password" class="form-control" id="regPass" required />
      <!-- // Поле пароля.
           // id="regPass" привязан к JS.
           // required = обязательное. -->
    </div>

    <button class="btn btn-main w-100 mt-3">הרשמה</button>
    <!-- // Кнопка отправки формы.
         // btn = базовый Bootstrap.
         // btn-main = твой кастомный стиль (розовый градиент).
         // w-100 = на всю ширину.
         // mt-3 = отступ сверху.
         // По умолчанию <button> внутри form = type="submit". -->

    <div id="regError" class="error-box"></div>
    <!-- // Блок ошибок.
         // id="regError" привязан к JS.
         // error-box скрыт display:none, JS показывает при ошибке. -->

    <p class="mt-3 text-center">
    <!-- // Текст-ссылка снизу. -->

      כבר יש לך משתמש?
      <!-- // “Уже есть пользователь?” -->

      <a href="radar.html">התחבר כאן</a>
      <!-- // Ссылка на страницу входа (radar.html). -->
    </p>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<!-- // Firebase core (initializeApp). Обязателен для работы firebase.* -->

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<!-- // Firebase Auth (createUserWithEmailAndPassword). -->

<script>
/* // Встроенный JS прямо в HTML (можно вынести в отдельный register.js). */

// Firebase
// // Конфиг того же проекта Firebase, что и в radar.js.
const firebaseConfig = {
// // Данные подключения к Firebase проекту.

  apiKey: "AIzaSyAbV_d5Y-Y1Z6Fgv9s6qEdwOa8ja7a-3EQ",
  // // API key проекта.

  authDomain: "sentrygun-lazer.firebaseapp.com",
  // // Домен auth.

  databaseURL: "https://sentrygun-lazer-default-rtdb.europe-west1.firebasedatabase.app",
  // // URL базы (здесь не используется, потому что database SDK не подключен).

  projectId: "sentrygun-lazer",
  // // ID проекта.

  storageBucket: "sentrygun-lazer.appspot.com",
  // // Storage bucket (не используется).

  messagingSenderId: "424543118066",
  // // Messaging (не используется).

  appId: "1:424543118066:web:97a60c901fe6d66e2e266b"
  // // appId веб-приложения.
};

const app = firebase.initializeApp(firebaseConfig);
// // Инициализируем Firebase.
// // Переменная app тут не используется дальше, но это нормально.

const auth = firebase.auth();
// // Получаем объект авторизации, чтобы создавать пользователя.

const regForm  = document.getElementById("registerForm");
// // Привязка к <form id="registerForm">.

const regEmail = document.getElementById("regEmail");
// // Привязка к <input id="regEmail">.

const regPass  = document.getElementById("regPass");
// // Привязка к <input id="regPass">.

const regError = document.getElementById("regError");
// // Привязка к <div id="regError">.

regForm.addEventListener("submit", e => {
// // Слушаем отправку формы.

  e.preventDefault();
// // Не перезагружаем страницу.

  auth
    .createUserWithEmailAndPassword(regEmail.value, regPass.value)
    // // Создаём пользователя в Firebase Auth.
    // // Важно: тут ты не делаешь trim(), но обычно это ок. При желании можно сделать .trim().

    .then(() => {
    // // Успех: пользователь создан.

      regError.style.display = "none";
      // // Прячем блок ошибки.

      window.location.href = "radar.html"; // сразу переход на логин
      // // Перенаправляем на radar.html.
      // // ВНИМАНИЕ: radar.html у тебя уже умеет и логин, и регистрацию.
      // // Если пользователь уже авторизован после регистрации, можно сразу вести на main, а не на “логин”.
    })

    .catch(err => {
    // // Ошибка: email занят, слабый пароль, неверный email и т.д.

      regError.style.display = "block";
      // // Показываем блок ошибок.

      regError.textContent = err.message;
      // // Выводим текст ошибки Firebase (на английском обычно).
    });
});
</script>

</body>
</html>
